name: 9router

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: 9router:local
    container_name: 9router
    restart: unless-stopped
    ports:
      - "20128:20128"
    environment:
      NODE_ENV: production
      PORT: 20128
      HOSTNAME: 0.0.0.0
      DATA_DIR: /app/data
    env_file:
      - path: .env
        required: false
    volumes:
      - 9router-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:20128/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  9router-data:
