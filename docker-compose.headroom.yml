# Optional Headroom sidecar — merge with the main compose file:
#   docker compose -f docker-compose.yml -f docker-compose.headroom.yml up -d --build
#
# In the dashboard: Endpoint → Token Saver → Headroom → URL http://headroom:8787

services:
  app:
    environment:
      HEADROOM_URL: http://headroom:8787
    depends_on:
      headroom:
        condition: service_started

  headroom:
    image: ghcr.io/chopratejas/headroom:latest
    container_name: 9router-headroom
    restart: unless-stopped
    ports:
      - "8787:8787"
